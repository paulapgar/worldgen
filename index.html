<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="favicon.ico" />
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0" /> -->
    <link rel="stylesheet" href="./src/style.css">
    <title>Procedural Generation for Landscapes</title>
  </head>
  <body style="margin: 0; padding: 0; overflow: hidden; display: flex; align-items: center; justify-content: flex-start; width: 100vw; height: 100vh;">
    <table id="center-wrapper" style="border-collapse: collapse;">
      <tr>
        <td id="game-container">
          <script type="module" src="./src/main.ts"></script>
        </td>
        <td id="ui-controls">
          <div id="randomize-container">
            <button id="randomize-seed" disabled="true">Randomize Seed</button>
            <span id="seed-value">0</span>
          </div>
          <button id="grayscale-btn" disabled="true">GrayScale</button>
          <button id="landscape-btn" disabled="true">Landscape</button>
          <button id="diamond-square-btn" disabled="true">Diamond-Square</button>
          <button id="open-simplex-btn" disabled="true">Open-Simplex</button>
          <button id="perlin-btn" disabled="true">Perlin</button>
          <div id="roughness-slider-container">
            <label for="roughness-slider">Roughness</label>
            <input type="range" id="roughness-slider" min="0" max="10" step="0.1" value="5.0" disabled="true">
            <span id="roughness-value">5.0</span>
          </div>
        </td>
      </tr>
    </table>
  </body>
</html>
